<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kira Chamber Home</title>

  <meta name="description" content="Kira Chamber of Commerce supports local businesses by providing resources, networking opportunities, and community events that promote growth and collaboration. Visitors can explore member businesses, stay updated on upcoming events, and access useful information about the local economy. The platform is designed to connect entrepreneurs, encourage partnerships, and strengthen the business environment within Kira. Whether you are a business owner or a visitor,
   the chamber offers valuable insights and opportunities for engagement.">
  <meta name="author" content="Murungi Innocent">
  <meta name="keywords" content="Kira Chamber of Commerce, local businesses, events, weather, spotlights">

  <link rel="stylesheet" href="styles/styles.css">

<header>
  <h1>Kira Chamber</h1>

  <nav>
