  <body>
    <header>
      <nav>
        <button id="menu">☰</button>
        <ul id="nav-links">
          <li><a href="index.html" class="active">Home</a></li>
          <li><a href="directory.html">Directory</a></li>
          <li><a href="join.html">Join</a></li>
          <li><a href="discover.html">Discover</a></li>
        </ul>
      </nav>
      
    </header>

<main class="container" >
  <h1>Join Kira Chamber of Commerce</h1>
    
  <!-- FORM -->
  <form method="get" action="thankyou.html">

  <!-- First Name -->
  <label for="firstName">First Name</label>
  <input type="text" id="firstName" name="firstName" autocomplete="given-name" title="Enter your first name" required>

  <!-- Last Name -->
  <label for="lastName">Last Name</label>
  <input type="text" id="lastName" name="lastName" autocomplete="family-name" title="Enter your last name" required>

  <!-- Organization Title -->
  <label for="orgTitle">Organization Title</label>
  <input type="text" id="orgTitle" name="orgTitle" autocomplete="organization-title" title="Enter your organization title" pattern="[A-Za-z\s\-]{7,}" required>

  <!-- Email -->
  <label for="email">Email Address</label>
  <input type="email" id="email" name="email" autocomplete="email" title="Enter your email address" placeholder="name@example.com" required>

  <!-- Mobile Phone -->
  <label for="phone">Mobile Phone</label>
  <input type="tel" id="phone" name="phone" autocomplete="tel" title="Enter your phone number" required>

  <!-- Organization Name -->
  <label for="organization">Organization Name</label>
  <input type="text" id="organization" name="organization" autocomplete="organization" title="Enter your organization name" required>

  <!-- Membership Level -->
  <label for="membership">Membership Level</label>
  <select id="membership" name="membership">
    <option value="np">NP Membership (Free)</option>
    <option value="bronze">Bronze Membership</option>
    <option value="silver">Silver Membership</option>
    <option value="gold">Gold Membership</option>
  </select>

  <!-- Organization Description -->
  <label for="description">Organization Description</label>
  <textarea id="description" name="description" title="Describe your organization"></textarea>

  <input type="hidden" id="timestamp" name="timestamp">

  <!-- Submit -->
  <button type="submit">Apply for Membership</button>

</form>

  <!-- MEMBERSHIP CARDS -->
  <section class="cards">
    <div class="card">
      <h2>NP Membership</h2>
      <button type="button" class="open-btn" data-type="np">View Benefits</button>
    </div>

    <div class="card">
      <h2>Bronze</h2>
      <button type="button" class="open-btn" data-type="bronze">View Benefits</button>
    </div>

    <div class="card">
      <h2>Silver</h2>
      <button type="button" class="open-btn" data-type="silver">View Benefits</button>
    </div>

    <div class="card">
      <h2>Gold</h2>
      <button type="button" class="open-btn" data-type="gold">View Benefits</button>
    </div>
  </section>

</main>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <button type="button" id="close-modal" aria-label="Close modal">✖</button>
    <p id="modal-text"></p>
  </div>
</div>

<footer>
      <p>Contact: info@kirachamber.org | +256 700 000000</p>

</html>
