<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Kira Chamber</title>

    <meta name="description" content="Join the Kira Chamber of Commerce to connect with local businesses, 
          grow your network, and explore new opportunities in your community.">
    <meta name="author" content="Murungi Innocent" />
    <meta
      name="keywords"
      content="Kira Chamber of Commerce, local businesses"/>

    <link rel="stylesheet" href="styles/join.css" />
    <link rel="stylesheet" href="styles/normalize.css" />
    <script src="scripts/join.js" defer></script>
    <link rel="icon" href="images/favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Roboto&display=swap"
      rel="stylesheet"/>

    <meta property="og:title" content="Join the Kira Chamber of Commerce Today">
    <meta
      property="og:description"
      content="Discover local businesses, events, and opportunities with Kira Chamber of Commerce."/>
    <meta
      property="og:image"
      content="https://murungi197.github.io/wdd231/chamber/images/hero.png"/>
    <meta
      property="og:url"
      content="https://murungi197.github.io/wdd231/chamber/index.html"/>
  </head>

  <body>
    <header>
      <nav>
        <button id="menu">☰</button>
        <ul id="nav-links">
          <li><a href="index.html" class="active">Home</a></li>
          <li><a href="directory.html">Directory</a></li>
          <li><a href="join.html">Join</a></li>
          <li><a href="discover.html">Discover</a></li>
        </ul>
      </nav>
      <h1>Join Kira Chamber of Commerce</h1>
    </header>

<main class="container">
    
  <!-- FORM -->
  <form method="get" action="thankyou.html">

    <label title="Enter your first name">
      First Name:
      <input type="text" name="fname" title="Enter your first name" required>
    </label>

    <label title="Enter your last name">
      Last Name:
      <input type="text" name="lname" title="Enter your last name" required autocomplete="family-name">
    </label>

    <input type="text" name="orgTitle"
            pattern="[A-Za-z\s\-]{7,}"
            title="At least 7 characters. Letters, spaces, and hyphens only.">

    <input type="email" name="email"
           placeholder="example@email.com"
           title="Enter your email address" required>

    <label title="Enter your phone number">
      Phone:
      <input type="tel" name="phone" title="Enter your phone number" required autocomplete="tel">
    </label>

    <label title="Enter business name">
      Business Name:
      <input type="text" name="business" title="Enter business name" required autocomplete="organization">
    </label>

    <label title="Choose membership level">
      Membership Level:
      <select name="membership">
        <option value="np">NP Membership</option>
        <option value="bronze">Bronze</option>
        <option value="silver">Silver</option>
        <option value="gold">Gold</option>
      </select>
    </label>

    <label title="Describe your business">
      Description:
      <textarea name="description"></textarea>
    </label>

    <!-- Hidden timestamp -->
    <input type="hidden" id="timestamp" name="timestamp">

    <input type="submit" value="Apply Now">

  </form>

  <!-- MEMBERSHIP CARDS -->
  <section class="cards">
    <div class="card">
      <h3>NP Membership</h3>
    </div>

    <div class="card">
      <h3>Bronze</h3>    
    </div>

    <div class="card">
      <h3>Silver</h3>
          </div>

    <div class="card">
      <h3>Gold</h3>
    </div>
  </section>

</main>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span onclick="closeModal()">✖</span>
    <p id="modal-text"></p>
  </div>
</div>

<footer>
      <p>Contact: info@kirachamber.org | +256 700 000000</p>
      <p>Murungi Innocent | WDD 231</p>
      <p>Last Modified: <span id="lastModified"></span></p>
    </footer>

</body>
</html>
