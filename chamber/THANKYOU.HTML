<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>
</head>

<body>

<h1>Thank You for Applying!<br>We welcome you to Kira Chamber of Commerce</h1>

<div id="results"></div>

<script>
  const params = new URLSearchParams(window.location.search);

  document.getElementById("results").innerHTML = `
    <p><strong>First Name:</strong> ${params.get("firstName") || ''}</p>
    <p><strong>Last Name:</strong> ${params.get("lastName") || ''}</p>
    <p><strong>Email:</strong> ${params.get("email") || ''}</p>
    <p><strong>Phone:</strong> ${params.get("phone") || ''}</p>
    <p><strong>Business:</strong> ${params.get("organization") || ''}</p>
    <p><strong>Submitted:</strong> ${params.get("timestamp") || ''}</p>
  `;
</script>

</body>
</html>
